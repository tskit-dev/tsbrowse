name: Docs

on:
  pull_request:
  push:
    branches: [main]
    tags:
      - '*'
  merge_group:

permissions:
  contents: read

jobs:
  Docs:
    permissions:
      contents: read
    uses: tskit-dev/.github/.github/workflows/docs.yml@v18
    with:
      pre-build-command: uv run --locked --no-default-groups --group=docs playwright install --with-deps chromium
