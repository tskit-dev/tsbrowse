name: Tests

on:
  pull_request:
  push:
    branches: [main, test]
  merge_group:

permissions:
  contents: read

jobs:
  packaging:
    name: Python packaging
    uses: tskit-dev/.github/.github/workflows/python-packaging.yml@v19

  test:
    name: Python
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.13"]
    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@d07a454dad7609a92316b57b23c9ccfd4f59af66  # 0.13.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          python-version: ${{ matrix.python }}
          version: "0.10.0"

      - name: Install dependencies
        run: uv sync --locked --group test --no-default-groups

      - name: Install playwright browsers
        run: uv run --no-default-groups playwright install --with-deps chromium

      - name: Run tests (with numba)
        run: |
          uv run --no-default-groups pytest --cov=tsbrowse --cov-branch \
            --cov-report=xml -x tests

      - name: Run tests (without numba)
        run: |
          TSBROWSE_DISABLE_NUMBA=1 uv run --no-default-groups pytest \
            --cov=tsbrowse --cov-branch --cov-report=xml --cov-append -x tests

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          flags: python-tests
          files: coverage.xml
          disable_search: true
          verbose: true
